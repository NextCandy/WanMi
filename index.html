<html lang="zh-CN">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="description" content="玩米 域名展示与管理系统" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Manrope（域名与 UI）与 IBM Plex Mono（数据）已自托管：Google Fonts 在中国大陆不可达，
         外链会让国内用户完全拿不到这两族字体。Manrope 为变量字体，一个文件覆盖 400-800。 -->
    <link rel="preload" href="/fonts/manrope-latin-400-800.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- 中文 Noto Sans SC 体积过大不宜自托管，仍走 Google Fonts；不可达时按 tokens.css 回退系统中文字体。 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" />
