<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;--accent:#2C5BD9;background:#F5F5F3;color:#1F2328;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue','PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{color:color-mix(in srgb,var(--accent) 78%,#000)}
input,button{font-family:inherit}
@keyframes dsIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes dsToast{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</helmet>
<div data-screen-label="DS Hunter 首页" style="height:100dvh;min-width:320px;display:flex;flex-direction:column;overflow:hidden">

  <!-- 导航栏 -->
  <div data-screen-label="导航栏" style="height:54px;flex-shrink:0;border-bottom:1px solid #E7E8EA;background:#FFFFFF;display:flex;align-items:center;padding:0 clamp(16px,3vw,28px);gap:9px">
    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" style="color:var(--accent);display:block">
      <circle cx="12" cy="12" r="8.1" stroke="currentColor" stroke-width="1.7"></circle>
      <circle cx="12" cy="12" r="2.5" fill="currentColor"></circle>
      <path d="M12 1.6v2.8M12 19.6v2.8M1.6 12h2.8M19.6 12h2.8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path>
    </svg>
    <span style="font-size:15px;font-weight:700;letter-spacing:-0.1px;color:#1F2328">DS Hunter</span>
    <a href="DS Hunter 后台.dc.html" style="margin-left:auto;font-size:13px;color:#57606A;display:flex;align-items:center;gap:4px" style-hover="color:var(--accent)">管理后台
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M7 17L17 7M9 7h8v8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
    </a>
  </div>

  <!-- 筛选区 · 桌面 -->
  <sc-if value="{{isDesktop}}" hint-placeholder-val="{{ true }}">
    <div data-screen-label="筛选器" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;padding:14px clamp(16px,3vw,28px) 12px">
      <div style="position:relative">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="position:absolute;left:11px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="7" stroke="#9AA1AB" stroke-width="2"></circle><path d="M20.3 20.3l-3.4-3.4" stroke="#9AA1AB" stroke-width="2" stroke-linecap="round"></path></svg>
        <input placeholder="搜索域名…" value="{{search}}" onChange="{{onSearch}}" style="width:248px;height:36px;border:1px solid #DFE1E5;border-radius:8px;background:#FFFFFF;padding:0 30px 0 33px;font-size:13px;color:#1F2328;outline:none;transition:border-color .12s,box-shadow .12s" style-focus="border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 12%,transparent)">
        <sc-if value="{{searchHas}}" hint-placeholder-val="{{ false }}">
          <button onClick="{{clearSearch}}" title="清空" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);width:22px;height:22px;border:none;background:transparent;color:#9AA1AB;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center" style-hover="color:#1F2328;background:#F1F2F3"><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path></svg></button>
        </sc-if>
      </div>

      <div style="position:relative">
        <button onClick="{{toggleTld}}" style="height:36px;display:flex;align-items:center;gap:7px;border:1px solid #DFE1E5;background:#FFFFFF;border-radius:8px;padding:0 11px;font-size:13px;cursor:pointer;color:#1F2328;transition:border-color .12s" style-hover="border-color:#C3C8CE">
          <span style="color:#8A919B">后缀</span><span style="font-weight:500">{{tldLabel}}</span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" style="margin-top:1px"><path d="M6 9l6 6 6-6" stroke="#8A919B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        </button>
        <sc-if value="{{tldOpen}}" hint-placeholder-val="{{ false }}">
          <div onClick="{{eatClick}}" style="position:absolute;top:41px;left:0;min-width:148px;background:#FFFFFF;border:1px solid #E6E7E9;border-radius:10px;box-shadow:0 10px 28px rgba(17,24,39,.12);padding:5px;z-index:40;animation:dsIn .14s ease">
            <sc-for list="{{tldOptions}}" as="o" hint-placeholder-count="4">
              <button onClick="{{o.pick}}" style="display:flex;width:100%;align-items:center;justify-content:space-between;gap:16px;padding:7px 10px;border:none;background:transparent;border-radius:6px;font-size:13px;cursor:pointer;text-align:left;color:{{o.fg}};font-weight:{{o.fw}}" style-hover="background:#F3F4F5">
                <span>{{o.label}}</span>
                <sc-if value="{{o.active}}" hint-placeholder-val="{{ false }}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M4 12.5l5 5L20 6.5" style="stroke:var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path></svg></sc-if>
              </button>
            </sc-for>
          </div>
        </sc-if>
      </div>

      <div style="position:relative">
        <button onClick="{{toggleLen}}" style="height:36px;display:flex;align-items:center;gap:7px;border:1px solid #DFE1E5;background:#FFFFFF;border-radius:8px;padding:0 11px;font-size:13px;cursor:pointer;color:#1F2328;transition:border-color .12s" style-hover="border-color:#C3C8CE">
          <span style="color:#8A919B">位数</span><span style="font-weight:500">{{lenLabel}}</span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" style="margin-top:1px"><path d="M6 9l6 6 6-6" stroke="#8A919B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        </button>
        <sc-if value="{{lenOpen}}" hint-placeholder-val="{{ false }}">
          <div onClick="{{eatClick}}" style="position:absolute;top:41px;left:0;min-width:148px;background:#FFFFFF;border:1px solid #E6E7E9;border-radius:10px;box-shadow:0 10px 28px rgba(17,24,39,.12);padding:5px;z-index:40;animation:dsIn .14s ease">
            <sc-for list="{{lenOptions}}" as="o" hint-placeholder-count="4">
              <button onClick="{{o.pick}}" style="display:flex;width:100%;align-items:center;justify-content:space-between;gap:16px;padding:7px 10px;border:none;background:transparent;border-radius:6px;font-size:13px;cursor:pointer;text-align:left;color:{{o.fg}};font-weight:{{o.fw}}" style-hover="background:#F3F4F5">
                <span>{{o.label}}</span>
                <sc-if value="{{o.active}}" hint-placeholder-val="{{ false }}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M4 12.5l5 5L20 6.5" style="stroke:var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path></svg></sc-if>
              </button>
            </sc-for>
          </div>
        </sc-if>
      </div>

      <div style="width:1px;height:20px;background:#E3E5E8;margin:0 2px"></div>

      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <sc-for list="{{chips}}" as="chip" hint-placeholder-count="6">
          <button onClick="{{chip.pick}}" style="height:32px;padding:0 13px;border-radius:999px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;flex-shrink:0;transition:background .12s,border-color .12s,color .12s;border:1px solid {{chip.bd}};background:{{chip.bg}};color:{{chip.fg}}" style-hover="border-color:{{chip.hbd}};color:{{chip.hfg}}">
            <sc-if value="{{chip.premium}}" hint-placeholder-val="{{ false }}"><svg width="9" height="9" viewBox="0 0 12 12" style="display:block"><path d="M6 1l5 5-5 5-5-5z" fill="{{chip.ico}}"></path></svg></sc-if>
            {{chip.label}}
          </button>
        </sc-for>
      </div>

      <div style="margin-left:auto;display:flex;align-items:center;gap:14px">
        <sc-if value="{{hasFilters}}" hint-placeholder-val="{{ false }}">
          <button onClick="{{clearAll}}" style="border:none;background:transparent;color:var(--accent);font-size:12.5px;cursor:pointer;padding:0" style-hover="text-decoration:underline">清除筛选</button>
        </sc-if>
        <span style="font-size:12.5px;color:#8A919B">{{countText}}</span>
      </div>
    </div>
  </sc-if>

  <!-- 筛选区 · 移动 -->
  <sc-if value="{{isMobile}}" hint-placeholder-val="{{ false }}">
    <div data-screen-label="筛选器（移动端）" style="display:flex;flex-direction:column;gap:9px;flex-shrink:0;padding:12px 16px 10px">
      <div style="position:relative">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="position:absolute;left:12px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="7" stroke="#9AA1AB" stroke-width="2"></circle><path d="M20.3 20.3l-3.4-3.4" stroke="#9AA1AB" stroke-width="2" stroke-linecap="round"></path></svg>
        <input placeholder="搜索域名…" value="{{search}}" onChange="{{onSearch}}" style="width:100%;height:44px;border:1px solid #DFE1E5;border-radius:10px;background:#FFFFFF;padding:0 38px;font-size:16px;color:#1F2328;outline:none" style-focus="border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 12%,transparent)">
        <sc-if value="{{searchHas}}" hint-placeholder-val="{{ false }}">
          <button onClick="{{clearSearch}}" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);width:28px;height:28px;border:none;background:transparent;color:#9AA1AB;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path></svg></button>
        </sc-if>
      </div>
      <div style="display:flex;gap:9px">
        <div style="position:relative;flex:1">
          <button onClick="{{toggleTld}}" style="width:100%;height:44px;display:flex;align-items:center;justify-content:space-between;border:1px solid #DFE1E5;background:#FFFFFF;border-radius:10px;padding:0 12px;font-size:14px;cursor:pointer;color:#1F2328">
            <span><span style="color:#8A919B">后缀 </span><span style="font-weight:500">{{tldLabel}}</span></span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#8A919B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          </button>
          <sc-if value="{{tldOpen}}" hint-placeholder-val="{{ false }}">
            <div onClick="{{eatClick}}" style="position:absolute;top:49px;left:0;right:0;background:#FFFFFF;border:1px solid #E6E7E9;border-radius:10px;box-shadow:0 10px 28px rgba(17,24,39,.14);padding:5px;z-index:40;animation:dsIn .14s ease">
              <sc-for list="{{tldOptions}}" as="o" hint-placeholder-count="4">
                <button onClick="{{o.pick}}" style="display:flex;width:100%;align-items:center;justify-content:space-between;padding:10px 11px;border:none;background:transparent;border-radius:6px;font-size:14px;cursor:pointer;text-align:left;color:{{o.fg}};font-weight:{{o.fw}}">
                  <span>{{o.label}}</span>
                  <sc-if value="{{o.active}}" hint-placeholder-val="{{ false }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M4 12.5l5 5L20 6.5" style="stroke:var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path></svg></sc-if>
                </button>
              </sc-for>
            </div>
          </sc-if>
        </div>
        <div style="position:relative;flex:1">
          <button onClick="{{toggleLen}}" style="width:100%;height:44px;display:flex;align-items:center;justify-content:space-between;border:1px solid #DFE1E5;background:#FFFFFF;border-radius:10px;padding:0 12px;font-size:14px;cursor:pointer;color:#1F2328">
            <span><span style="color:#8A919B">位数 </span><span style="font-weight:500">{{lenLabel}}</span></span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#8A919B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          </button>
          <sc-if value="{{lenOpen}}" hint-placeholder-val="{{ false }}">
            <div onClick="{{eatClick}}" style="position:absolute;top:49px;left:0;right:0;background:#FFFFFF;border:1px solid #E6E7E9;border-radius:10px;box-shadow:0 10px 28px rgba(17,24,39,.14);padding:5px;z-index:40;animation:dsIn .14s ease">
              <sc-for list="{{lenOptions}}" as="o" hint-placeholder-count="4">
                <button onClick="{{o.pick}}" style="display:flex;width:100%;align-items:center;justify-content:space-between;padding:10px 11px;border:none;background:transparent;border-radius:6px;font-size:14px;cursor:pointer;text-align:left;color:{{o.fg}};font-weight:{{o.fw}}">
                  <span>{{o.label}}</span>
                  <sc-if value="{{o.active}}" hint-placeholder-val="{{ false }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M4 12.5l5 5L20 6.5" style="stroke:var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path></svg></sc-if>
                </button>
              </sc-for>
            </div>
          </sc-if>
        </div>
      </div>
      <div style="display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px">
        <sc-for list="{{chips}}" as="chip" hint-placeholder-count="6">
          <button onClick="{{chip.pick}}" style="height:38px;padding:0 15px;border-radius:999px;font-size:13.5px;cursor:pointer;display:flex;align-items:center;gap:5px;flex-shrink:0;border:1px solid {{chip.bd}};background:{{chip.bg}};color:{{chip.fg}}">
            <sc-if value="{{chip.premium}}" hint-placeholder-val="{{ false }}"><svg width="9" height="9" viewBox="0 0 12 12" style="display:block"><path d="M6 1l5 5-5 5-5-5z" fill="{{chip.ico}}"></path></svg></sc-if>
            {{chip.label}}
          </button>
        </sc-for>
      </div>
    </div>
  </sc-if>

  <!-- 域名网格 -->
  <div data-screen-label="域名列表" style="flex:1;min-height:0;position:relative;padding:4px clamp(16px,3vw,28px) 14px">
    <div ref="{{gridRef}}" style="height:100%;display:grid;grid-template-columns:repeat(auto-fill,minmax(min(205px,42vw),1fr));grid-auto-rows:{{cardH}}px;gap:14px;align-content:start;overflow-y:auto">
      <sc-for list="{{pageItems}}" as="item" hint-placeholder-count="10">
        <div onClick="{{item.copy}}" onMouseEnter="{{item.enter}}" onMouseLeave="{{item.leave}}" title="点击复制" style="position:relative;background:#FFFFFF;border:1px solid #E8E9EB;border-radius:10px;box-shadow:0 1px 2px rgba(17,24,39,.04);display:flex;align-items:center;justify-content:center;padding:0 16px;min-height:64px;cursor:pointer;user-select:none;transition:border-color .15s,box-shadow .15s,transform .15s" style-hover="border-color:color-mix(in srgb,var(--accent) 40%,#E8E9EB);box-shadow:0 5px 14px rgba(17,24,39,.07);transform:translateY(-1px)">
          <div style="font-size:{{item.fz}}px;line-height:1.3;text-align:center;overflow-wrap:anywhere;max-height:100%;overflow:hidden"><span style="font-weight:600;color:#1F2328">{{item.name}}</span><span style="font-weight:500;color:#9AA1AA">{{item.tld}}</span></div>
          <sc-if value="{{item.premium}}" hint-placeholder-val="{{ false }}">
            <div style="position:absolute;top:7px;right:7px;display:flex;align-items:center;gap:3px;background:#FFF6E0;border:1px solid #F0E3BC;color:#96690A;font-size:10px;font-weight:600;padding:2px 6px;border-radius:6px;line-height:1.4"><svg width="8" height="8" viewBox="0 0 12 12" style="display:block"><path d="M6 1l5 5-5 5-5-5z" fill="#D9A514"></path></svg>精品</div>
          </sc-if>
          <div style="position:absolute;top:8px;left:8px;opacity:{{item.hovOp}};transition:opacity .12s;color:#9AA1AA;display:flex">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2"></path></svg>
          </div>
        </div>
      </sc-for>
    </div>
    <sc-if value="{{emptyShow}}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#C3C8CE" stroke-width="2"></circle><path d="M20.3 20.3l-3.4-3.4" stroke="#C3C8CE" stroke-width="2" stroke-linecap="round"></path><path d="M8 11h6" stroke="#C3C8CE" stroke-width="2" stroke-linecap="round"></path></svg>
        <span style="font-size:14px;color:#8A919B">没有找到匹配的域名</span>
        <button onClick="{{clearAll}}" style="height:34px;padding:0 15px;border-radius:8px;border:1px solid color-mix(in srgb,var(--accent) 32%,#fff);background:color-mix(in srgb,var(--accent) 7%,#fff);color:var(--accent);font-size:13px;cursor:pointer" style-hover="background:color-mix(in srgb,var(--accent) 12%,#fff)">清除全部筛选</button>
      </div>
    </sc-if>
  </div>

  <!-- 分页 · 桌面 -->
  <sc-if value="{{isDesktop}}" hint-placeholder-val="{{ true }}">
    <div data-screen-label="分页" style="display:flex;align-items:center;flex-shrink:0;padding:2px clamp(16px,3vw,28px) 12px">
      <sc-if value="{{hasAny}}" hint-placeholder-val="{{ true }}">
        <span style="font-size:12.5px;color:#8A919B">{{pageInfo}}</span>
      </sc-if>
      <sc-if value="{{hasAny}}" hint-placeholder-val="{{ true }}">
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
          <button onClick="{{prevGo}}" title="上一页" style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid #E1E3E7;background:#FFFFFF;border-radius:7px;cursor:{{prevCur}};opacity:{{prevOp}}" style-hover="border-color:#C3C8CE"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#57606A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
          <sc-for list="{{pager}}" as="pg" hint-placeholder-count="4">
            <sc-if value="{{pg.gap}}" hint-placeholder-val="{{ false }}"><span style="font-size:12px;color:#8A919B;padding:0 3px">…</span></sc-if>
            <sc-if value="{{pg.num}}" hint-placeholder-val="{{ true }}">
              <button onClick="{{pg.go}}" style="min-width:30px;height:30px;padding:0 9px;border-radius:7px;font-size:13px;cursor:pointer;border:1px solid {{pg.bd}};background:{{pg.bg}};color:{{pg.fg}};font-weight:{{pg.fw}};transition:border-color .12s" style-hover="border-color:{{pg.hbd}}">{{pg.label}}</button>
            </sc-if>
          </sc-for>
          <button onClick="{{nextGo}}" title="下一页" style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid #E1E3E7;background:#FFFFFF;border-radius:7px;cursor:{{nextCur}};opacity:{{nextOp}}" style-hover="border-color:#C3C8CE"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#57606A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
        </div>
      </sc-if>
    </div>
  </sc-if>

  <!-- 分页 · 移动 -->
  <sc-if value="{{isMobile}}" hint-placeholder-val="{{ false }}">
    <div data-screen-label="分页（移动端）" style="display:flex;align-items:center;justify-content:center;gap:18px;flex-shrink:0;padding:4px 16px 10px">
      <sc-if value="{{hasAny}}" hint-placeholder-val="{{ true }}">
        <button onClick="{{prevGo}}" style="width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:1px solid #E1E3E7;background:#FFFFFF;border-radius:10px;cursor:{{prevCur}};opacity:{{prevOp}}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#57606A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
      </sc-if>
      <sc-if value="{{hasAny}}" hint-placeholder-val="{{ true }}">
        <span style="font-size:13.5px;color:#57606A;min-width:64px;text-align:center">{{pageShort}}</span>
      </sc-if>
      <sc-if value="{{hasAny}}" hint-placeholder-val="{{ true }}">
        <button onClick="{{nextGo}}" style="width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:1px solid #E1E3E7;background:#FFFFFF;border-radius:10px;cursor:{{nextCur}};opacity:{{nextOp}}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#57606A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
      </sc-if>
    </div>
  </sc-if>

  <!-- 页脚 -->
  <div data-screen-label="页脚" style="height:48px;flex-shrink:0;border-top:1px solid #E7E8EA;background:#FFFFFF;display:flex;align-items:center;padding:0 clamp(16px,3vw,28px)">
    <span style="font-size:12px;color:#9AA1AB">© 2026 DS Hunter</span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:4px">
      <button title="微信" onClick="{{toggleWx}}" style="width:{{footBtn}}px;height:{{footBtn}}px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:8px;cursor:pointer;color:#57606A;transition:background .12s,color .12s" style-hover="background:#F1F2F3;color:var(--accent)">

<script type="text/x-dc" data-dc-script data-props="{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0F766E&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#2C5BD9&quot;,&quot;#4338CA&quot;,&quot;#0F766E&quot;,&quot;#374151&quot;],&quot;section&quot;:&quot;外观&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;紧凑&quot;,&quot;options&quot;:[&quot;舒适&quot;,&quot;紧凑&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;外观&quot;},&quot;premiumFirst&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;行为&quot;}}">
const DOMAINS = [
  // 精品
  {n:'yunmao',t:'.com',c:'双拼',p:1},{n:'mocang',t:'.com',c:'双拼',p:1},{n:'feilu',t:'.com',c:'双拼',p:1},

  {n:'kvx',t:'.com',c:'字母',p:1},{n:'qzr',t:'.com',c:'字母',p:1},{n:'xwf',t:'.com',c:'字母',p:1},
  {n:'veloce',t:'.com',c:'单词',p:1},{n:'quill',t:'.cc',c:'单词',p:1},{n:'arbor',t:'.io',c:'单词',p:1},
  {n:'nimbus',t:'.ai',c:'单词',p:1},{n:'orchid',t:'.cc',c:'单词',p:1},
  // 双拼
  {n:'tanhai',t:'.cn',c:'双拼',p:0},{n:'weisu',t:'.net',c:'双拼',p:0},{n:'lengshan',t:'.com',c:'双拼',p:0},
  {n:'qiaomu',t:'.cn',c:'双拼',p:0},{n:'huoshi',t:'.cc',c:'双拼',p:0},{n:'miaoda',t:'.top',c:'双拼',p:0},
  {n:'shuye',t:'.cn',c:'双拼',p:0},{n:'yuncao',t:'.net',c:'双拼',p:0},{n:'baiwu',t:'.cc',c:'双拼',p:0},
  {n:'fengti',t:'.com',c:'双拼',p:0},{n:'gulin',t:'.cn',c:'双拼',p:0},{n:'heliu',t:'.net',c:'双拼',p:0},
  {n:'jinshu',t:'.cc',c:'双拼',p:0},{n:'kaimu',t:'.top',c:'双拼',p:0},{n:'luoxia',t:'.com',c:'双拼',p:0},
  {n:'mengqi',t:'.cn',c:'双拼',p:0},{n:'nuanyang',t:'.com',c:'双拼',p:0},{n:'pinzhuo',t:'.cc',c:'双拼',p:0},
  {n:'rongshan',t:'.cn',c:'双拼',p:0},{n:'songtao',t:'.top',c:'双拼',p:0},
  // 数字
  {n:'51678',t:'.com',c:'数字',p:0},{n:'80936',t:'.cn',c:'数字',p:0},{n:'63670',t:'.net',c:'数字',p:0},
  {n:'92105',t:'.cc',c:'数字',p:0},{n:'34589',t:'.top',c:'数字',p:0},{n:'77012',t:'.com',c:'数字',p:0},
  {n:'55867',t:'.cn',c:'数字',p:0},{n:'22903',t:'.net',c:'数字',p:0},{n:'66175',t:'.cc',c:'数字',p:0},
  {n:'90211',t:'.top',c:'数字',p:0},{n:'12967',t:'.com',c:'数字',p:0},{n:'45230',t:'.cn',c:'数字',p:0},
  {n:'516780',t:'.com',c:'数字',p:0},{n:'809361',t:'.cn',c:'数字',p:0},
  // 字母
  {n:'gxvt',t:'.com',c:'字母',p:0},{n:'hjkl',t:'.cn',c:'字母',p:0},{n:'plmk',t:'.net',c:'字母',p:0},
  {n:'qwzx',t:'.cc',c:'字母',p:0},{n:'rtyu',t:'.top',c:'字母',p:0},{n:'vbnm',t:'.com',c:'字母',p:0},
  {n:'zxas',t:'.cn',c:'字母',p:0},{n:'wsad',t:'.net',c:'字母',p:0},{n:'kvxr',t:'.cc',c:'字母',p:0},{n:'qzrt',t:'.top',c:'字母',p:0},
  // 单词
  {n:'harbor',t:'.top',c:'单词',p:0},{n:'meadow',t:'.cc',c:'单词',p:0},{n:'willow',t:'.top',c:'单词',p:0},
  {n:'falcon',t:'.cn',c:'单词',p:0},{n:'garnet',t:'.net',c:'单词',p:0},{n:'cobalt',t:'.cc',c:'单词',p:0},
  {n:'sierra',t:'.top',c:'单词',p:0},{n:'marble',t:'.cn',c:'单词',p:0},{n:'timber',t:'.io',c:'单词',p:0},{n:'lagoon',t:'.cc',c:'单词',p:0},
  // 组合
  {n:'cloudora',t:'.com',c:'组合',p:0},{n:'hostley',t:'.net',c:'组合',p:0},{n:'domicore',t:'.com',c:'组合',p:0},
  {n:'netquill',t:'.cc',c:'组合',p:0},{n:'siteforge',t:'.io',c:'组合',p:0},{n:'webgrove',t:'.com',c:'组合',p:0},
  {n:'pixelbay',t:'.cc',c:'组合',p:0},{n:'codemint',t:'.io',c:'组合',p:0},{n:'datamoss',t:'.net',c:'组合',p:0},
  {n:'hypernest',t:'.ai',c:'组合',p:0},{n:'softlark',t:'.com',c:'组合',p:0},{n:'brightkey',t:'.cn',c:'组合',p:0},
  {n:'coreleaf',t:'.io',c:'组合',p:0},{n:'stackmere',t:'.com',c:'组合',p:0},{n:'gridfox',t:'.net',c:'组合',p:0},
  {n:'lumenway',t:'.cc',c:'组合',p:0},{n:'zenpath',t:'.io',c:'组合',p:0},{n:'swiftoak',t:'.com',c:'组合',p:0},
  {n:'novacrest',t:'.net',c:'组合',p:0},{n:'echoform',t:'.ai',c:'组合',p:0},
  {n:'smartcloudhosting',t:'.com',c:'组合',p:0},{n:'bestdomainmarket',t:'.net',c:'组合',p:0},
  {n:'greenenergyfarm',t:'.cn',c:'组合',p:0},{n:'digitalworkspace',t:'.io',c:'组合',p:0}
];
const TLDS = ['全部','.com','.cn','.net','.cc','.io','.ai','.top'];
const LENS = ['全部','3位及以下','4位','5位','6位','7位及以上'];
const CATS = ['全部','精品','双拼','单词','数字','字母','组合'];

class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = { search:'', tld:'全部', len:'全部', cat:'全部', page:1, menu:null,
      toast:'', toastOn:false, wx:false, hover:-1, gw:1232, gh:620, winW:1280 };
    this.gridRef = React.createRef();
    this.onWin = this.onWin.bind(this);
    this.onDocClick = this.onDocClick.bind(this);
  }
  componentDidMount() {
    this.applyVars();
    this.onWin();
    window.addEventListener('resize', this.onWin);
    document.addEventListener('click', this.onDocClick);
    if (window.ResizeObserver && this.gridRef.current) {
      this.ro = new ResizeObserver((es) => {
        const r = es[0].contentRect;
        if (Math.abs(r.width - this.state.gw) > 4 || Math.abs(r.height - this.state.gh) > 4) {
          this.setState({ gw: r.width, gh: r.height });
        }
      });
      this.ro.observe(this.gridRef.current);
    }
  }
  componentWillUnmount() {
    window.removeEventListener('resize', this.onWin);
    document.removeEventListener('click', this.onDocClick);
    if (this.ro) this.ro.disconnect();
    clearTimeout(this._tt);
  }
  componentDidUpdate() { this.applyVars(); }
  applyVars() {
    document.body.style.setProperty('--accent', this.props.accent ?? '#2C5BD9');
  }
  onWin() { this.setState({ winW: window.innerWidth }); }
  onDocClick() { if (this.state.menu || this.state.wx) this.setState({ menu:null, wx:false }); }
  showToast(t) {
    clearTimeout(this._tt);
    this.setState({ toast:t, toastOn:true });
    this._tt = setTimeout(() => this.setState({ toastOn:false }), 1800);
  }
  copyText(t, label) {
    const done = () => this.showToast(label || ('已复制  ' + t));
    const fb = () => {
      try {
        const ta = document.createElement('textarea');
        ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta); done();
      } catch (e) { done(); }
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).then(done).catch(fb);
    } else fb();
  }
  lenMatch(len, b) {
    if (b === '全部') return true;
    if (b === '3位及以下') return len <= 3;
    if (b === '4位') return len === 4;
    if (b === '5位') return len === 5;
    if (b === '6位') return len === 6;
    return len >= 7;
  }
  renderVals() {
    const s = this.state;
    const density = this.props.density ?? '舒适';
    const isMobile = s.winW < 720;
    const isDesktop = !isMobile;
    const cardH = isMobile ? (density === '紧凑' ? 72 : 84) : (density === '紧凑' ? 78 : 96);
    const premiumFirst = this.props.premiumFirst ?? true;
    const q = s.search.trim().toLowerCase();

    let list = DOMAINS.filter((d) => {
      const full = d.n + d.t;
      if (q && full.toLowerCase().indexOf(q) < 0) return false;
      if (s.tld !== '全部' && d.t !== s.tld) return false;
      if (!this.lenMatch(d.n.length, s.len)) return false;
      if (s.cat === '精品') { if (!d.p) return false; }
      else if (s.cat !== '全部' && d.c !== s.cat) return false;
      return true;
    });
    list = list.slice().sort((a, b) => {
      if (premiumFirst && a.p !== b.p) return b.p - a.p;
      if (a.n.length !== b.n.length) return a.n.length - b.n.length;
      return (a.n + a.t).localeCompare(b.n + b.t);
    });

    const gap = 14;
    const minW = Math.min(205, 0.42 * s.winW);
    const cols = Math.max(1, Math.floor((s.gw + gap) / (minW + gap)));
    const rows = Math.max(2, Math.floor((s.gh + gap) / (cardH + gap)));
    const pageSize = Math.max(4, cols * rows);
    const total = list.length;
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    const page = Math.min(s.page, totalPages);

    const pageItems = list.slice((page - 1) * pageSize, page * pageSize).map((d, i) => {
      const full = d.n + d.t;
      const L = full.length;
      const fz = L <= 10 ? 21 : L <= 13 ? 19 : L <= 16 ? 17 : L <= 20 ? 15 : L <= 26 ? 14 : 13;
      const idx = (page - 1) * pageSize + i;
      return {
        full, name: d.n, tld: d.t, premium: !!d.p, fz,
        hovOp: s.hover === idx ? 1 : 0,
        copy: () => this.copyText(full),
        enter: () => this.setState({ hover: idx }),
        leave: () => this.setState({ hover: -1 })
      };
    });

    // 分页序列
    const win = [];
    if (totalPages <= 7) { for (let i = 1; i <= totalPages; i++) win.push(i); }
    else {
      let a = Math.max(2, page - 1), b = Math.min(totalPages - 1, page + 1);
      if (page <= 3) { a = 2; b = 4; }
      if (page >= totalPages - 2) { a = totalPages - 3; b = totalPages - 1; }
      win.push(1);
      if (a > 2) win.push('g1');
      for (let i = a; i <= b; i++) win.push(i);
      if (b < totalPages - 1) win.push('g2');
      win.push(totalPages);
    }
    const pager = win.map((w) => {
      if (typeof w === 'string') return { key: w, gap: true, num: false, label: '…' };
      const act = w === page;
      return { key: 'p' + w, gap: false, num: true, label: String(w), active: act,
        bd: act ? 'transparent' : '#E1E3E7', bg: act ? 'var(--accent)' : '#FFFFFF',
        fg: act ? '#FFFFFF' : '#3B434B', fw: act ? 600 : 400, hbd: act ? 'transparent' : '#C3C8CE',
        go: () => this.setState({ page: w }) };
    });
    const canPrev = page > 1, canNext = page < totalPages;

    const chips = CATS.map((c) => {
      const act = s.cat === c;
      return { label: c, premium: c === '精品', active: act,
        bd: act ? 'transparent' : '#E1E3E7', bg: act ? 'var(--accent)' : '#FFFFFF',
        fg: act ? '#FFFFFF' : '#57606A', hbd: act ? 'transparent' : '#C3C8CE',
        hfg: act ? '#FFFFFF' : '#1F2328', ico: act ? '#FFFFFF' : '#D9A514',
        pick: () => this.setState({ cat: c, page: 1 }) };
    });
    const mkOpts = (arr, key) => arr.map((v) => ({
      label: v, active: s[key] === v,
      fg: s[key] === v ? 'var(--accent)' : '#1F2328',
      fw: s[key] === v ? 600 : 400,
      pick: () => this.setState({ [key]: v, page: 1, menu: null })
    }));

    const hasFilters = !!(q || s.tld !== '全部' || s.len !== '全部' || s.cat !== '全部');

    return {
      gridRef: this.gridRef,
      isDesktop, isMobile, cardH,
      search: s.search, searchHas: !!s.search,
      onSearch: (e) => this.setState({ search: e.target.value, page: 1 }),
      clearSearch: () => this.setState({ search: '', page: 1 }),
      tldLabel: s.tld, lenLabel: s.len,
      tldOpen: s.menu === 'tld', lenOpen: s.menu === 'len',
      toggleTld: (e) => { e.stopPropagation(); this.setState({ menu: s.menu === 'tld' ? null : 'tld', wx: false }); },
      toggleLen: (e) => { e.stopPropagation(); this.setState({ menu: s.menu === 'len' ? null : 'len', wx: false }); },
      tldOptions: mkOpts(TLDS, 'tld'), lenOptions: mkOpts(LENS, 'len'),
      chips,
      countText: '共 ' + total + ' 个域名',
      hasFilters,
      clearAll: () => this.setState({ search: '', tld: '全部', len: '全部', cat: '全部', page: 1 }),
      pageItems, emptyShow: total === 0, hasAny: total > 0,
      pageInfo: '第 ' + page + ' / ' + totalPages + ' 页',
      pageShort: page + ' / ' + totalPages,
      pager,
      prevGo: () => { if (canPrev) this.setState({ page: page - 1 }); },
      nextGo: () => { if (canNext) this.setState({ page: page + 1 }); },
      prevOp: canPrev ? 1 : 0.4, nextOp: canNext ? 1 : 0.4,
      prevCur: canPrev ? 'pointer' : 'default', nextCur: canNext ? 'pointer' : 'default',
      toastOn: s.toastOn, toast: s.toast,
      wxOpen: s.wx,
      toggleWx: (e) => { e.stopPropagation(); this.setState({ wx: !s.wx, menu: null }); },
      copyWx: (e) => { e.stopPropagation(); this.copyText('DSHunter2026', '已复制微信号  DSHunter2026'); this.setState({ wx: false }); },
      eatClick: (e) => e.stopPropagation(),
      adminClick: (e) => { e.preventDefault(); this.showToast('管理后台入口（原型示意）'); },
      footBtn: isMobile ? 44 : 30
    };
  }
}
</script>
